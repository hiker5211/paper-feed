name: Auto RSS Fetch

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:      # 允许手动触发

concurrency:
  group: paper-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 这一步非常重要：赋予脚本写入仓库的权限
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run RSS Script
      env: 
        RSS_JOURNALS: ${{ secrets.RSS_JOURNALS }}
        RSS_KEYWORDS: ${{ secrets.RSS_KEYWORDS }}
      run: python get_RSS.py

    - name: Run AI Summary Script
      env:
        AI_SUMMARY_ENABLED: ${{ secrets.AI_SUMMARY_ENABLED }}
        AI_API_CONFIG: ${{ secrets.AI_API_CONFIG }}
        AI_SUMMARY_PROMPT: ${{ secrets.AI_SUMMARY_PROMPT }}
        AI_SUMMARY_INTERVAL_HOURS: ${{ secrets.AI_SUMMARY_INTERVAL_HOURS }}
        AI_SUMMARY_MAX_CANDIDATES: ${{ secrets.AI_SUMMARY_MAX_CANDIDATES }}
      run: python ai_summary.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        if [ -f filtered_feed.xml ]; then git add filtered_feed.xml; fi
        if [ -f ai_summary_feed.xml ]; then git add ai_summary_feed.xml; fi
        if [ -f ai_summary.html ]; then git add ai_summary.html; fi
        if [ -f ai_summary_state.json ]; then git add ai_summary_state.json; fi
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update RSS feed"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
        fi
